name: ADTC Benchmark

on:
  workflow_dispatch:
    inputs:
      context_length:
        description: "Context length for benchmarks"
        required: false
        default: "2048"
      threads:
        description: "Thread count (empty = auto-detect via nproc)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        model:
          - name: qwen2.5-3b
            repo: bartowski/Qwen2.5-3B-Instruct-GGUF
            file: Qwen2.5-3B-Instruct-Q4_K_M.gguf
            params: "3.09B"
            display: Qwen2.5-3B-Instruct-Q4_K_M
          - name: qwen2.5-coder-7b
            repo: bartowski/Qwen2.5-Coder-7B-Instruct-GGUF
            file: Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf
            params: "7.62B"
            display: Qwen2.5-Coder-7B-Instruct-Q4_K_M

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          FREE_KB=$(df --output=avail / | tail -1)
          FREE_GB=$((FREE_KB / 1024 / 1024))
          if [ "$FREE_GB" -lt 8 ]; then
            echo "Low disk space (${FREE_GB}GB free), cleaning up..."
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
              /usr/local/share/boost /usr/local/lib/julia || true
            df -h /
          else
            echo "Disk space OK: ${FREE_GB}GB free"
          fi

      - name: Cache GGUF model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: models/${{ matrix.model.file }}
          key: gguf-${{ matrix.model.repo }}-${{ matrix.model.file }}

      - name: Cache llama-bench binary
        uses: actions/cache@v4
        id: bench-cache
        with:
          path: llama-bench/
          key: llama-bench-b10076-ubuntu-x64

      - name: Download llama-bench
        if: steps.bench-cache.outputs.cache-hit != 'true'
        run: |
          curl -L --fail -o llama-bench.tar.gz \
            "https://github.com/ggml-org/llama.cpp/releases/download/b10076/llama-b10076-bin-ubuntu-x64.tar.gz"
          mkdir -p llama-bench
          tar xzf llama-bench.tar.gz -C llama-bench --strip-components=1
          rm llama-bench.tar.gz
          chmod +x llama-bench/llama-bench
          echo "llama-bench version:"
          ./llama-bench/llama-bench --version || true

      - name: Add llama-bench to PATH
        run: echo "$(pwd)/llama-bench" >> "$GITHUB_PATH"

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --progress-bar -o "models/${{ matrix.model.file }}" \
            "https://huggingface.co/${{ matrix.model.repo }}/resolve/main/${{ matrix.model.file }}"

      - name: Install adtc-profiler
        run: |
          pip install --break-system-packages \
            "git+https://github.com/Africa-Deep-Tech-Foundation/adtc-profiler.git"

      - name: Capture system metadata
        id: sysmeta
        run: |
          echo "vcpus=$(nproc)" >> "$GITHUB_OUTPUT"
          echo "ram_mb=$(free -m | awk '/^Mem:/{print $2}')" >> "$GITHUB_OUTPUT"
          lscpu | tee /tmp/lscpu.txt
          uname -a | tee /tmp/uname.txt

      - name: Run llama-bench Config A (phone-parity)
        run: |
          mkdir -p bench-results
          bash benchmarks/adtc/scripts/run_bench.sh \
            "models/${{ matrix.model.file }}" \
            A \
            "bench-results/${{ matrix.model.name }}-configA.json"

      - name: Run llama-bench Config B (submission-intended)
        run: |
          bash benchmarks/adtc/scripts/run_bench.sh \
            "models/${{ matrix.model.file }}" \
            B \
            "bench-results/${{ matrix.model.name }}-configB.json"

      - name: Run adtc-profiler audit
        run: |
          mkdir -p submission-dir
          cp models/${{ matrix.model.file }} submission-dir/model.gguf
          cat > submission-dir/metadata.json << 'METAEOF'
          {
            "team_id": "adtc-2026",
            "domain": "coding_assistants",
            "language_scope": ["en"],
            "african_alpha_claim": false,
            "budget_laptop_claim": true,
            "submitter": {
              "name": "ADTC Team",
              "email": "team@adtc.africa",
              "github_handle": "africa-deep-tech-foundation"
            },
            "cross_disciplinary_pairing": {
              "discipline": "education",
              "load_bearing": true,
              "description": "LLM benchmarks for ADTC competition"
            },
            "test_prompts": [
              {"prompt_id": "tp_001", "prompt": "Write a Python function that reads a CSV file and returns the column with the highest mean value."},
              {"prompt_id": "tp_002", "prompt": "Explain the difference between a list and a tuple in Python, and give one example where each is the better choice."}
            ],
            "model": {
              "name": "${{ matrix.model.display }}",
              "runtime": "llama.cpp",
              "quantization": "GGUF Q4_K_M",
              "parameters_estimate": "${{ matrix.model.params }}",
              "packaging": "binary_bundle"
            },
            "_runtime": {
              "model_path": "model.gguf"
            }
          }
          METAEOF
          adtc-profiler run \
            --submission submission-dir \
            --mode audit \
            --output "bench-results/${{ matrix.model.name }}-audit.json" \
            --skip-accuracy

      - name: Add file size to results JSON
        run: |
          FILE_SIZE=$(stat -c%s "models/${{ matrix.model.file }}" 2>/dev/null || echo 0)
          FILE_SIZE_GB=$(echo "scale=2; $FILE_SIZE / 1073741824" | bc)
          for f in bench-results/${{ matrix.model.name }}-config*.json; do
            python3 -c "import json,sys; d=json.loads(open(sys.argv[1]).read()); d['file_size_gb']=float(sys.argv[2]); open(sys.argv[1],'w').write(json.dumps(d,indent=2))" "$f" "$FILE_SIZE_GB"
          done

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.model.name }}
          path: bench-results/

  report:
    runs-on: ubuntu-latest
    needs: [bench]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/
          pattern: bench-*
          merge-multiple: true

      - name: Render report
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_NUM="${GITHUB_RUN_NUMBER}"
          python3 benchmarks/adtc/scripts/render_report.py \
            "$RUN_NUM" "$SHORT_SHA" "all-results/" \
            "benchmarks/adtc/results-${RUN_NUM}-${SHORT_SHA}.md"
          cp "benchmarks/adtc/results-${RUN_NUM}-${SHORT_SHA}.md" \
            benchmarks/adtc/LATEST.md

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/adtc/
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_NUM="${GITHUB_RUN_NUMBER}"
          git commit -m "Add ADTC benchmark report (run ${RUN_NUM}) [skip ci]"
          git push
